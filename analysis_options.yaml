include: package:flutter_lints/flutter.yaml

analyzer:
  # 0. Ignora pastas mortas e arquivos gerados
  exclude:
    - "build/**"
    - ".fvm/**"
    - ".dart_tool/**"
    - "android/**"
    - "ios/**"
    - "web/**"
    - "screens/**"
    - "**/*.g.dart"
  # 1. Checagens Estritas (Impede a IA de usar 'dynamic' por preguiça)
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

  # 2. Elevando a régua (Transforma avisos em ERROS que quebram o build)
  errors:
    missing_required_param: error
    missing_return: error
    always_declare_return_types: error
    avoid_dynamic_calls: error
    avoid_print: warning # Mantém warning para não travar debug local de humanos, mas será pego no CI/CD

linter:
  rules:
    # --- Regras Vitais para IA e DX (Formatação Perfeita) ---
    require_trailing_commas: true
    avoid_print: true
    always_declare_return_types: true
    prefer_single_quotes: true

    # --- Performance e Otimização do Flutter ---
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true # Nova regra adicionada da sua lista
    use_key_in_widget_constructors: true
    sized_box_for_whitespace: true # Nova regra: Força SizedBox em vez de Container vazio

    # --- Prevenção de Bugs (Pontos cegos da IA e Memória) ---
    avoid_empty_else: true
    cancel_subscriptions: true
    close_sinks: true
    valid_regexps: true
    avoid_dynamic_calls: true
    unawaited_futures: true # Nova regra: Impede que a IA esqueça o 'await' em funções assíncronas

    # --- Padrão de Projeto (Clean Code) ---
    flutter_style_todos: true # Nova regra: Força a IA a criar TODOs no padrão correto com link/usuário
